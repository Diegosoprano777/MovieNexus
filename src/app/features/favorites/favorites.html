<div class="favorites-container">
  <div class="header-section">
    <h1 class="page-title">Tus Favoritos</h1>
    <p class="page-subtitle">Las películas que has guardado para ver más tarde.</p>
  </div>

  @if (favorites().length === 0) {
    <app-empty-state
      icon="❤️"
      title="Aún no tienes favoritos"
      message="Explora el catálogo y guarda las películas que más te gusten."
      actionText="Explorar Películas"
      actionLink="/home">
    </app-empty-state>
  } @else {
    <div class="movies-grid">
      @for (movie of favorites(); track movie.id) {
        <app-movie-card [movie]="movie"></app-movie-card>
      }
    </div>
  }
</div>
